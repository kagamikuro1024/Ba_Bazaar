name: ba-bazaar-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: ba-bazaar-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ba_bazaar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_DB: ${POSTGRES_DB:-ba_bazaar}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - ba_bazaar_pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-ba_bazaar} -d ${POSTGRES_DB:-ba_bazaar}'
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ba_bazaar_pgdata_dev:
