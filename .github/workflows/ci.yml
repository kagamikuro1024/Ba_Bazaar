name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - minerals

jobs:
  validate:
    name: Lint, Test, Typecheck, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @ba-bazaar/api db:generate

      - name: Validate Prisma schema
        run: pnpm --filter @ba-bazaar/api db:validate

      - name: Lint
        run: pnpm lint

      - name: Typecheck API
        run: pnpm --filter @ba-bazaar/api typecheck

      - name: Typecheck Web
        run: pnpm --filter @ba-bazaar/web typecheck

      - name: Test API
        run: pnpm --filter @ba-bazaar/api test

      - name: Build API
        run: pnpm --filter @ba-bazaar/api build

      - name: Build Web
        run: pnpm --filter @ba-bazaar/web build

  functional:
    name: Functional API Smoke Test
    runs-on: ubuntu-latest
    needs: validate

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ba_bazaar
          POSTGRES_PASSWORD: change_me
          POSTGRES_DB: ba_bazaar
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ba_bazaar -d ba_bazaar"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://ba_bazaar:change_me@localhost:5432/ba_bazaar?schema=public
      API_PORT: 3000
      JWT_SECRET: ci-functional-jwt-secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @ba-bazaar/api db:generate

      - name: Apply database migrations
        run: pnpm --filter @ba-bazaar/api exec prisma migrate deploy --schema prisma/schema.prisma

      - name: Seed functional test data
        run: pnpm --filter @ba-bazaar/api db:seed

      - name: Start API server
        run: |
          pnpm --filter @ba-bazaar/api dev > /tmp/ba-bazaar-api.log 2>&1 &
          echo $! > /tmp/ba-bazaar-api.pid
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:3000/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/ba-bazaar-api.log
          exit 1

      - name: Run functional checks
        run: scripts/ci-functional-check.sh

      - name: Print API log on failure
        if: failure()
        run: cat /tmp/ba-bazaar-api.log || true
